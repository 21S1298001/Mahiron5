                $ref: "#/components/schemas/Error"
  /channels/{type}/{channel}:
    get:
      tags:
        - channels
      operationId: getChannel
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum:
              - GR
              - BS
              - CS
              - SKY
              - EXT1
              - EXT2
              - EXT3
              - EXT4
              - EXT5
              - EXT6
              - EXT7
              - EXT8
              - EXT9
        - name: channel
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /channels/{type}:
    get:
      tags:
        - channels
      operationId: getChannelsByType
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum:
              - GR
              - BS
              - CS
              - SKY
              - EXT1
              - EXT2
              - EXT3
              - EXT4
              - EXT5
              - EXT6
              - EXT7
              - EXT8
              - EXT9
        - name: channel
          in: query
          schema:
            type: string
        - name: name
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
